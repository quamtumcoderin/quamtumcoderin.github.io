<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defensa de los tipos</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="icon" href="../assets/img/pokeball.png" type="image/png">
    <script src="../index.js" type="module"></script>
</head>
<body>
    <header>
        <button><a id="../index.html" class="act">Inicio</a></button>
        <h1>WikiDex</h1>

    <main class="types-main">
        <h2 class="element">Selecciona el tipo o los tipos</h2>
        <section id="selectors">
            <div class="element">
                <div id="select-one" class="selector">Primer tipo</div>

            </div>
            <div class="element">
                <div id="select-two" class="selector">Segundo tipo</div>
                <ul  id="type-two" class="options"></ul>
            </div>
        </section>
        <section id="types-defense" class="element">
            <div class="types-row element">
                <h2 id="defense-title">Defensa</h4>
            </div>
            <div class="types-row element">
                <h3 class="multipliyers">Recibe x4 de</h3>
                <div class="types"></div>
            </div>
            <div class="types-row element">
                <h3 class="multipliyers">Recibe x2 de</h3>
                <div class="types"></div>
            </div>
            <div class="types-row element">
                <h3 class="multipliyers">Recibe x1 de</h3>
                <div class="types"></div>
            </div>
            <div class="types-row element">
                <h3 class="multipliyers">Recibe /2 de</h3>
                <div class="types"></div>
            </div>
            <div class="types-row element">
                <h3 class="multipliyers">Recibe /4 de</h3>
                <div class="types"></div>
            </div>
            <div class="types-row element">
                <h3 class="multipliyers">Inmune a</h3>
                <div class="types"></div>
            </div>
        </section>
    </main>
</body>
</html>
