<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ataque de los tipos</title>
    <link rel="stylesheet" href="../styles/style.css">
    <script src="../index.js" type="module"></script>
</head>
<body>
    <header>
        <button><a id="../index.html" class="act">Inicio</a></button>
        <h1>WikiDex</h1>
    </header>
    <main class="attack-main">
        <h2 class="element">Selecciona el tipo</h2>
        <section id="attack-selector">
            <div class="element">
                <div id="select-attack-type" class="attack-selector">Tipo de ataque</div>
                <ul id="type-one-attack" class="attack-options"></ul>
            </div>
        </section>
        <section id="types-attack" class="element">
            <div class="attack-row element">
                <h2 id="attack-title">Ataque</h2>
            </div>
            <div class="attack-row element">
                <h3 class="multipliyers">Daño x2</h3>
                <div class="attack-types"></div>
            </div>
            <div class="attack-row element">
                <h3 class="multipliyers">Daño x1</h3>
                <div class="attack-types"></div>
            </div>
            <div class="attack-row element">
                <h3 class="multipliyers">Daño /2</h3>
                <div class="attack-types"></div>
            </div>
            <div class="attack-row element">
                <h3 class="multipliyers">Sin daño</h3>
                <div class="attack-types"></div>
            </div>
        </section>
    </main>
</body>
</html>
